site_name: torchcrop
site_description: A PyTorch-native library for hybrid crop modeling.
site_author: geonextgis
site_url: https://geonextgis.github.io/torchcrop
repo_url: https://github.com/geonextgis/torchcrop

extra_javascript:
    - https://polyfill.io/v3/polyfill.min.js?features=es6
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

copyright: "Copyright &copy; 2024 - 2024 Krishnagopal Halder"

theme:
    palette:
        - scheme: default
          primary: teal
          accent: teal
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - scheme: slate
          primary: teal
          accent: teal
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
    name: material
    icon:
        repo: fontawesome/brands/github
    # logo: assets/logo.png
    # favicon: assets/favicon.png
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.top
        - search.highlight
        - search.share
    custom_dir: "docs/overrides"
    font:
        text: Google Sans
        code: Regular

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - git-revision-date-localized:
          enable_creation_date: true
          type: timeago
    # - pdf-export
    - mkdocs-jupyter:
          include_source: True
          ignore_h1_titles: True
          execute: false
          allow_errors: false
          ignore: ["conf.py"]
          execute_ignore: ["*ignore.ipynb"]

markdown_extensions:
    - admonition
    - abbr
    - attr_list
    - def_list
    - footnotes
    - meta
    - md_in_html
    - pymdownx.superfences
    - pymdownx.highlight:
          linenums: true
    - toc:
          permalink: true

# extra:
#     analytics:
#         provider: google
#         property: UA-XXXXXXXXX-X

nav:
    - Home: index.md
    - Installation: installation.md
    - Usage: usage.md
    - Contributing: contributing.md
    - FAQ: faq.md
    - Changelog: changelog.md
    - Report Issues: https://github.com/geonextgis/torchcrop/issues
    - Examples:
          - examples/intro.ipynb
    - API Reference:
          - Overview: api/torchcrop.md
          - Config: api/config.md
          - Engine: api/engine.md
          - Model: api/model.md
          - Drivers:
                - weather: api/drivers/weather.md
          - Parameters:
                - crop_params: api/parameters/crop_params.md
                - site_params: api/parameters/site_params.md
                - soil_params: api/parameters/soil_params.md
          - States:
                - model_state: api/states/model_state.md
          - Functions:
                - fst_functions: api/functions/fst_functions.md
                - interpolation: api/functions/interpolation.md
                - smoothing: api/functions/smoothing.md
          - Neural Networks:
                - learned_stress: api/nn/learned_stress.md
                - param_net: api/nn/param_net.md
                - residual: api/nn/residual.md
          - Processes:
                - astro: api/processes/astro.md
                - evapotranspiration: api/processes/evapotranspiration.md
                - irradiation: api/processes/irradiation.md
                - leaf_dynamics: api/processes/leaf_dynamics.md
                - nutrient_demand: api/processes/nutrient_demand.md
                - partitioning: api/processes/partitioning.md
                - phenology: api/processes/phenology.md
                - photosynthesis: api/processes/photosynthesis.md
                - root_dynamics: api/processes/root_dynamics.md
                - stress: api/processes/stress.md
                - water_balance: api/processes/water_balance.md
          - Utils:
                - io: api/utils/io.md
                - validation: api/utils/validation.md
                - vis: api/utils/vis.md
